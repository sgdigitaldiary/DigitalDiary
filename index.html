<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1c1b1a;
    --bg2:       #252422;
    --bg3:       #2e2c29;
    --bg4:       #383530;
    --surface:   #302e2b;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --text:      #e8e4df;
    --text2:     #a09890;
    --text3:     #6b6560;
    --accent:    #da755b;
    --accent2:   #c4614a;
    --accent-bg: rgba(218,117,91,0.12);
    --accent-bg2:rgba(218,117,91,0.22);
    --eggshell:  #f4ede4;
    --radius:    12px;
    --radius-sm: 8px;
    --radius-lg: 18px;
    --transition: 0.18s ease;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ── HOME PAGE ── */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 2rem;
    text-align: center;
    gap: 0;
  }

  .home-icon {
    width: 72px; height: 72px;
    background: var(--accent-bg);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2.2rem;
    border: 1px solid rgba(218,117,91,0.2);
  }
  .home-icon svg { width: 34px; height: 34px; color: var(--accent); }

  .home-title {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .home-subtitle {
    font-size: 0.875rem;
    color: var(--text3);
    margin-bottom: 3.5rem;
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .home-buttons {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    justify-content: center;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.65rem 1.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0.65rem 1.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background var(--transition), color var(--transition), transform var(--transition);
  }
  .btn-secondary:hover { background: var(--bg4); color: var(--text); transform: translateY(-1px); }
  .btn-secondary:active { transform: translateY(0); }

  .home-recent {
    margin-top: 3.5rem;
    width: 100%;
    max-width: 460px;
  }
  .home-recent-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 0.75rem;
    text-align: left;
  }
  .recent-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .recent-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.9rem;
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition);
    text-align: left;
  }
  .recent-item:hover { background: var(--bg4); border-color: var(--border2); }
  .recent-date { font-size: 0.8rem; color: var(--text2); font-weight: 400; }
  .recent-preview { font-size: 0.75rem; color: var(--text3); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .recent-chevron { color: var(--text3); font-size: 0.75rem; }

  /* ── CALENDAR OVERLAY ── */
  #cal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #cal-overlay.open { display: flex; }

  .cal-modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.75rem 2rem 1.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: modalIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.93) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .cal-nav {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), color var(--transition);
  }
  .cal-nav:hover { background: var(--bg4); color: var(--text); }
  .cal-month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 1.25rem;
  }
  .cal-dow {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text3);
    padding: 0 0 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 400;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text2);
    transition: background var(--transition), color var(--transition);
    border: 1.5px solid transparent;
    position: relative;
  }
  .cal-day:hover:not(.empty):not(.other-month) {
    background: var(--bg4);
    color: var(--text);
  }
  .cal-day.today {
    color: var(--accent);
    font-weight: 600;
  }
  .cal-day.today::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cal-day.has-entry::before {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }
  .cal-day.selected {
    background: var(--eggshell);
    color: #2a2018;
    font-weight: 600;
    border-color: transparent;
  }
  .cal-day.other-month { color: var(--text3); opacity: 0.4; cursor: default; }
  .cal-day.empty { cursor: default; }

  .cal-footer {
    display: flex; gap: 0.5rem; justify-content: flex-end;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  /* ── EDITOR PAGE ── */
  #editor-page {
    display: none;
    min-height: 100vh;
    width: 100%;
    flex-direction: column;
  }
  #editor-page.open { display: flex; }

  .editor-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.875rem 1.5rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    gap: 1rem;
  }

  .topbar-left {
    display: flex; align-items: center; gap: 1rem;
    flex-shrink: 0;
  }

  .back-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: var(--radius-sm);
    padding: 0.4rem 0.75rem;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.3rem;
    transition: background var(--transition), color var(--transition);
  }
  .back-btn:hover { background: var(--bg4); color: var(--text); }

  .editor-date-display {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .topbar-right {
    font-size: 0.72rem;
    color: var(--text3);
    text-align: right;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .topbar-right .days-count {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    display: block;
  }

  /* Toolbar */
  .editor-toolbar {
    display: flex; align-items: center; gap: 2px;
    padding: 0.5rem 1.5rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 2px;
  }
  .toolbar-sep {
    width: 1px; height: 20px;
    background: var(--border2);
    margin: 0 4px;
    align-self: center;
  }
  .tb-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    border-radius: 6px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    transition: background var(--transition), color var(--transition);
    position: relative;
  }
  .tb-btn:hover { background: var(--bg4); color: var(--text); }
  .tb-btn.active { background: var(--accent-bg); color: var(--accent); }
  .tb-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tb-label { font-size: 0.7rem; font-weight: 600; font-family: 'Inter', sans-serif; }

  .tb-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    padding: 0.25rem 0.4rem;
    font-size: 0.72rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    height: 30px;
  }
  .tb-select:focus { outline: none; border-color: var(--accent); }

  /* Editor body */
  .editor-body {
    flex: 1;
    padding: 2.5rem 3rem 4rem;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }

  #content-area {
    min-height: 65vh;
    outline: none;
    font-size: 1rem;
    line-height: 1.8;
    color: var(--text);
    caret-color: var(--accent);
    word-break: break-word;
  }
  #content-area:empty::before {
    content: "Start writing your thoughts for today…";
    color: var(--text3);
    pointer-events: none;
    display: block;
  }
  #content-area h1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; color: var(--text); margin: 1.2rem 0 0.5rem; font-weight: 400; }
  #content-area h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); margin: 1rem 0 0.4rem; font-weight: 400; }
  #content-area h3 { font-size: 1.1rem; color: var(--text); margin: 0.8rem 0 0.3rem; font-weight: 600; }
  #content-area p { margin: 0.2rem 0; }
  #content-area strong { font-weight: 600; color: var(--text); }
  #content-area em { font-style: italic; color: var(--text2); }
  #content-area u { text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 3px; }
  #content-area s { text-decoration: line-through; color: var(--text3); }
  #content-area ul { padding-left: 1.4rem; margin: 0.3rem 0; }
  #content-area ol { padding-left: 1.4rem; margin: 0.3rem 0; }
  #content-area li { margin: 0.2rem 0; line-height: 1.7; }
  #content-area a { color: var(--accent); text-decoration: none; }
  #content-area a:hover { text-decoration: underline; }
  #content-area blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
    margin: 0.8rem 0;
    color: var(--text2);
    font-style: italic;
  }

  /* Checklist items */
  .check-item {
    display: flex; align-items: flex-start; gap: 0.6rem;
    margin: 0.25rem 0;
    line-height: 1.7;
  }
  .check-item input[type="checkbox"] {
    appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    background: var(--bg3);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 4px;
    transition: background var(--transition), border-color var(--transition);
    position: relative;
  }
  .check-item input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 8px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg);
  }
  .check-item .check-text {
    flex: 1;
    outline: none;
    min-width: 1px;
    color: var(--text);
  }
  .check-item input[type="checkbox"]:checked + .check-text {
    text-decoration: line-through;
    color: var(--text3);
  }

  /* Save indicator */
  .save-indicator {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.4rem 0.9rem;
    font-size: 0.72rem;
    color: var(--text3);
    display: flex; align-items: center; gap: 0.4rem;
    transition: opacity 0.3s ease;
    z-index: 20;
    pointer-events: none;
  }
  .save-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
  }
  .save-indicator.saved .dot { background: #4caf7d; }
  .save-indicator.saved { color: var(--text2); }
</style>
</head>
<body>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div id="home">
  <div class="home-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      <line x1="9" y1="7" x2="15" y2="7"/>
      <line x1="9" y1="11" x2="15" y2="11"/>
    </svg>
  </div>
  <h1 class="home-title">My Diary</h1>
  <p class="home-subtitle">your private space to think freely</p>

  <div class="home-buttons">
    <button class="btn-primary" onclick="openToday()">Today</button>
    <button class="btn-secondary" onclick="openCal()">Select date</button>
  </div>

  <div class="home-recent" id="recent-section" style="display:none;">
    <div class="home-recent-label">Recent entries</div>
    <div class="recent-list" id="recent-list"></div>
  </div>
</div>

<!-- ═══════════════ CALENDAR OVERLAY ═══════════════ -->
<div id="cal-overlay">
  <div class="cal-modal">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">&#8592;</button>
      <span class="cal-month-label" id="cal-label">June 2026</span>
      <button class="cal-nav" id="cal-next">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-footer">
      <button class="btn-secondary" style="font-size:0.8rem;padding:0.5rem 1rem;" onclick="closeCal()">Cancel</button>
      <button class="btn-primary" style="font-size:0.8rem;padding:0.5rem 1rem;" id="cal-select-btn" onclick="confirmCalDate()">Select</button>
    </div>
  </div>
</div>

<!-- ═══════════════ EDITOR PAGE ═══════════════ -->
<div id="editor-page">
  <div class="editor-topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()">&#8592; Home</button>
      <div class="editor-date-display" id="editor-date-label"></div>
    </div>
    <div class="topbar-right">
      <span class="days-count" id="days-count-num"></span>
      <span id="days-count-label"></span>
    </div>
  </div>

  <div class="editor-toolbar">
    <!-- Headings -->
    <select class="tb-select" id="heading-select" onchange="applyHeading(this.value)">
      <option value="">Paragraph</option>
      <option value="h1">Heading 1</option>
      <option value="h2">Heading 2</option>
      <option value="h3">Heading 3</option>
    </select>

    <div class="toolbar-sep"></div>

    <button class="tb-btn" onclick="fmt('bold')" title="Bold"><span class="tb-label">B</span></button>
    <button class="tb-btn" onclick="fmt('italic')" title="Italic"><span class="tb-label" style="font-style:italic">I</span></button>
    <button class="tb-btn" onclick="fmt('underline')" title="Underline"><span class="tb-label" style="text-decoration:underline">U</span></button>
    <button class="tb-btn" onclick="fmt('strikeThrough')" title="Strikethrough"><span class="tb-label" style="text-decoration:line-through">S</span></button>

    <div class="toolbar-sep"></div>

    <button class="tb-btn" onclick="fmt('insertUnorderedList')" title="Bullet list">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="tb-btn" onclick="fmt('insertOrderedList')" title="Numbered list">
      <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="6" fill="currentColor" stroke="none">1</text><text x="2" y="14" font-size="6" fill="currentColor" stroke="none">2</text><text x="2" y="20" font-size="6" fill="currentColor" stroke="none">3</text></svg>
    </button>
    <button class="tb-btn" onclick="insertChecklist()" title="Checklist">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </button>

    <div class="toolbar-sep"></div>

    <button class="tb-btn" onclick="fmt('formatBlock', 'blockquote')" title="Quote">
      <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
    </button>

    <div class="toolbar-sep"></div>

    <button class="tb-btn" onclick="fmt('undo')" title="Undo">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
    </button>
    <button class="tb-btn" onclick="fmt('redo')" title="Redo">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.95"/></svg>
    </button>
  </div>

  <div class="editor-body">
    <div id="content-area" contenteditable="true" spellcheck="true"></div>
  </div>
</div>

<div class="save-indicator" id="save-indicator">
  <span class="dot"></span>
  <span id="save-text">All changes saved</span>
</div>

<script>
const TARGET = new Date(2027, 0, 15);
const entries = JSON.parse(localStorage.getItem('diary_entries') || '{}');
let currentDate = null;
let calViewDate = new Date();
let calSelected = null;
let saveTimer = null;

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDisplayDate(d) {
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function daysUntilTarget(fromDate) {
  const from = new Date(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());
  const to   = new Date(TARGET.getFullYear(), TARGET.getMonth(), TARGET.getDate());
  const diff = Math.floor((to - from) / 86400000);
  return diff;
}

function openToday() {
  openEditor(new Date());
}

function openCal() {
  calSelected = null;
  calViewDate = new Date();
  renderCal();
  document.getElementById('cal-overlay').classList.add('open');
}

function closeCal() {
  document.getElementById('cal-overlay').classList.remove('open');
}

function confirmCalDate() {
  if (!calSelected) return;
  closeCal();
  openEditor(new Date(calSelected + 'T00:00:00'));
}

function openEditor(date) {
  currentDate = date;
  const key = dateKey(date);

  document.getElementById('editor-date-label').textContent = formatDisplayDate(date);

  const days = daysUntilTarget(date);
  const numEl = document.getElementById('days-count-num');
  const lblEl = document.getElementById('days-count-label');
  if (days > 0) {
    numEl.textContent = days;
    lblEl.textContent = 'days to Jan 15, 2027';
  } else if (days === 0) {
    numEl.textContent = 'Today!';
    lblEl.textContent = 'is Jan 15, 2027';
  } else {
    numEl.textContent = Math.abs(days);
    lblEl.textContent = 'days after Jan 15, 2027';
  }

  const ca = document.getElementById('content-area');
  ca.innerHTML = entries[key] || '';

  document.getElementById('home').style.display = 'none';
  document.getElementById('editor-page').classList.add('open');
  ca.focus();
  setSaveStatus('saved');
}

function goHome() {
  saveCurrentEntry();
  document.getElementById('editor-page').classList.remove('open');
  document.getElementById('home').style.display = 'flex';
  renderRecent();
}

function fmt(cmd, val) {
  document.getElementById('content-area').focus();
  document.execCommand(cmd, false, val || null);
}

function applyHeading(tag) {
  document.getElementById('content-area').focus();
  if (!tag) document.execCommand('formatBlock', false, 'p');
  else document.execCommand('formatBlock', false, tag);
  document.getElementById('heading-select').value = '';
}

function insertChecklist() {
  const ca = document.getElementById('content-area');
  ca.focus();
  const wrapper = document.createElement('div');
  wrapper.className = 'check-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.addEventListener('change', saveCurrentEntry);
  const span = document.createElement('span');
  span.className = 'check-text';
  span.contentEditable = 'true';
  span.textContent = '';
  wrapper.appendChild(cb);
  wrapper.appendChild(span);
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.collapse(false);
    range.insertNode(wrapper);
    const newRange = document.createRange();
    newRange.setStart(span, 0);
    newRange.collapse(true);
    sel.removeAllRanges();
    sel.addRange(newRange);
  } else {
    ca.appendChild(wrapper);
    span.focus();
  }
}

function saveCurrentEntry() {
  if (!currentDate) return;
  const key = dateKey(currentDate);
  const html = document.getElementById('content-area').innerHTML.trim();
  if (html && html !== '') entries[key] = html;
  else delete entries[key];
  localStorage.setItem('diary_entries', JSON.stringify(entries));
}

function setSaveStatus(state) {
  const el = document.getElementById('save-indicator');
  if (state === 'saving') {
    el.classList.remove('saved');
    document.getElementById('save-text').textContent = 'Saving…';
  } else {
    el.classList.add('saved');
    document.getElementById('save-text').textContent = 'All changes saved';
  }
}

document.getElementById('content-area').addEventListener('input', () => {
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveCurrentEntry();
    setSaveStatus('saved');
  }, 800);
});

/* ── Calendar ── */
function renderCal() {
  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  const today = new Date();
  const todayKey = dateKey(today);

  document.getElementById('cal-label').textContent =
    calViewDate.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const dows = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  dows.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(y, m, 1);
  let startDow = first.getDay();
  if (startDow === 0) startDow = 7;
  startDow -= 1;

  const daysInMonth = new Date(y, m+1, 0).getDate();
  const prevMonthDays = new Date(y, m, 0).getDate();

  for (let i = 0; i < startDow; i++) {
    const d2 = new Date(y, m-1, prevMonthDays - startDow + 1 + i);
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d2.getDate();
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(y, m, d);
    const key = dateKey(date);
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (key === todayKey) el.classList.add('today');
    if (entries[key]) el.classList.add('has-entry');
    if (key === calSelected) el.classList.add('selected');
    el.textContent = d;
    el.addEventListener('click', () => {
      calSelected = key;
      renderCal();
    });
    grid.appendChild(el);
  }

  const total = startDow + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

document.getElementById('cal-prev').onclick = () => {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()-1, 1);
  renderCal();
};
document.getElementById('cal-next').onclick = () => {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth()+1, 1);
  renderCal();
};
document.getElementById('cal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cal-overlay')) closeCal();
});

/* ── Recent entries ── */
function renderRecent() {
  const keys = Object.keys(entries).sort((a,b) => b.localeCompare(a)).slice(0,5);
  const sec = document.getElementById('recent-section');
  const list = document.getElementById('recent-list');
  if (keys.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = '';
  keys.forEach(key => {
    const d = new Date(key + 'T00:00:00');
    const preview = entries[key].replace(/<[^>]+>/g,'').slice(0,60) || 'No content';
    const item = document.createElement('div');
    item.className = 'recent-item';
    item.innerHTML = `
      <div>
        <div class="recent-date">${formatDisplayDate(d)}</div>
        <div class="recent-preview">${preview}…</div>
      </div>
      <div class="recent-chevron">›</div>`;
    item.onclick = () => openEditor(d);
    list.appendChild(item);
  });
}

renderRecent();
</script>
